[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = /dev/ttyUSB0
build_flags = -DESP32
build_src_filter = +<*> -<targets/esp32/pintest.cpp>

[env:pintest]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = +<targets/esp32/pintest.cpp>
